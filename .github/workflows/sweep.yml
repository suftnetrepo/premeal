name: Sweep worker

# Render's Background Worker service has no free tier — this runs the
# same sweep every 5 minutes for free instead, using two GitHub Actions
# settings scoped to the "Pre-Meal-Config" environment (Settings ->
# Environments -> Pre-Meal-Config):
#   - Variable APP_URL: your deployed Render URL, e.g. https://premeal.onrender.com
#   - Secret CRON_SECRET: must match the CRON_SECRET env var set on the
#     Render Web Service
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab, useful for testing

jobs:
  sweep:
    runs-on: ubuntu-latest
    # Required — without this, the job can't see APP_URL/CRON_SECRET at
    # all, since they're scoped to this named environment, not the repo
    # itself. Must match the environment name exactly (case-sensitive).
    environment: Pre-Meal-Config
    steps:
      - name: Call the sweep endpoint
        run: |
          curl -sf "${{ vars.APP_URL }}/api/cron/sweep?secret=${{ secrets.CRON_SECRET }}" \
            -o response.json -w "\nHTTP %{http_code}\n"
          cat response.json